# orenoBiomni Nginx Reverse Proxy Configuration
#
# Mounted into nginx container as /etc/nginx/conf.d/default.conf
# (included within the http{} context by the base nginx image)
#
# Routes:
#   /api/*            -> backend (FastAPI :8000)
#   /ga4gh/*          -> backend (FastAPI :8000)
#   /docs, /redoc     -> backend (FastAPI :8000)
#   /openapi.json     -> backend (FastAPI :8000)
#   /metrics          -> backend (FastAPI :8000)
#   /*                -> frontend (Next.js :3000)

# WebSocket/SSE upgrade map — must precede server blocks that reference it
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=60r/s;

# Upstream definitions
upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Allow health checks over HTTP (used by Docker healthcheck)
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    # SSL configuration
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Client body size (for file uploads)
    client_max_body_size 100M;

    # Proxy buffer settings for SSE/streaming
    proxy_buffering off;
    proxy_cache off;

    # Common proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket/SSE upgrade support
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # ── Backend routes ──────────────────────────────────────────────────

    # FastAPI endpoints
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend;
        proxy_read_timeout 600s;  # Match BIOMNI_TIMEOUT_SECONDS
        proxy_send_timeout 600s;
    }

    # GA4GH TRS/DRS endpoints
    location /ga4gh/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://backend;
        proxy_read_timeout 120s;
    }

    # OpenAPI documentation
    location /docs {
        proxy_pass http://backend;
    }

    location /redoc {
        proxy_pass http://backend;
    }

    location /openapi.json {
        proxy_pass http://backend;
    }

    # Prometheus metrics endpoint
    location /metrics {
        proxy_pass http://backend;
        # Optionally restrict to internal IPs:
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # deny all;
    }

    # ── Frontend routes ─────────────────────────────────────────────────

    # Next.js HMR websocket (dev only, harmless in prod)
    location /_next/webpack-hmr {
        proxy_pass http://frontend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js static assets
    location /_next/ {
        proxy_pass http://frontend;
        proxy_cache_valid 200 1h;
    }

    # Default: frontend
    location / {
        limit_req zone=general_limit burst=40 nodelay;
        proxy_pass http://frontend;
    }
}
