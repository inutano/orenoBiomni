name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install ruff

      - name: Lint
        run: ruff check app/ tests/

      - name: Run unit tests
        run: pytest tests/test_parser.py -v

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build backend image
        run: docker build -f docker/Dockerfile.backend -t orenoiomni-backend .

      - name: Build worker image
        run: docker build -f docker/Dockerfile.worker -t orenoiomni-worker .

      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t orenoiomni-frontend .
